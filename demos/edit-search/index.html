<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />

<title>Search Review</title>

<link rel="stylesheet" href="css/demo.css">

<style>.spell-error {
  border: 2px solid #c41230; /* your red */
}</style>

</head>
<body>
<div>
  <div class="title-bar l-gap-16 l-flex-row">
    <div class="l-gap-8 l-flex-row l-m20">
      <div class="lts r"></div>
      <div class="lts y"></div>
      <div class="lts g"></div>
    </div>
    <h2 class="l-m0">Search and Edit </h2>  
  </div>

  <main id="weeklySection" class="main-section l-m0-auto">
    <section>
      <div class="search-panel">
        <div class="search-helper">
          <span>Click</span>
          <button type="button" id="searchAllBtn" class="btn">Search All</button>
          <span>to view every entry, or use the <b>search box</b> below to narrow your results.</span>
        </div>

        <div class="l-flex-col l-gap-30">
          <input type="search" class="searchbox" id="searchBox" placeholder="Search by title, CCN, summary, status" />

          <div class="filter-row">
            <div id="filters" class="l-flex l-gap-10">
              <label id="filters-label">Filter by</label>
              <span class="select-wrap"><select id="filterCreatedDate"><option value="">All Dates</option></select></span>
              <span class="select-wrap"><select id="filterCaseCategory"><option value="">All Categories</option></select></span>
              <span class="select-wrap"><select id="filterCreatedBy"><option value="">All Creators</option></select></span>
              <span class="select-wrap"><select id="filterTitle"><option value="">All Titles</option></select></span>
              <span class="select-wrap"><select id="filterCCN"><option value="">All CCNs</option></select></span>
            </div>

            <button type="button" id="filterClearBtn" class="btn filterclear">Reset All</button>
          </div>
        </div>
      </div>

      <section>
        <div id="results" class="results">
          <div id="resultsActions" class="results-actions"></div>
          <div class="tview is-showing" data-view="table" id="resultsTableHost"></div>
          <div id="resultsActionsBottom" class="results-actions-bottom"></div>
        </div>
      </section>

      <div id="pageBlocker" class="page-blocker hidden"></div>

      <div id="entryOverlay" class="entry-overlay entry-overlay--hidden">
        <div class="entry-panel l-flex-col" role="dialog" aria-modal="true" aria-label="Weekly details">
          <button type="button" class="panel-close btn" aria-label="Close details">Close X</button>
          <div id="entryCardSlot" class="entry-panel-body l-flex-col"></div>
        </div>
      </div>

      <template id="entryTemplate">
        <div class="entry">
          <div class="entry-header">
            <div class="entry-title__info"></div>
            <h3 class="entry-title__text"></h3>
            <div class="entry-meta"></div>
          </div>

          <div class="entry-edit l-flex-col">
            <section class="edit-section">
              <div class="edit-column" data-edit-section="summary">
                <h3 class="l-m0">Summary</h3>
                <div class="inline-tags-block">
                  <div class="prefix-bar">
                    <button type="button" class="prefix-btn" data-prefix="S">S</button>
                    <button type="button" class="prefix-btn" data-prefix="SF">SF</button>
                    <button type="button" class="prefix-btn" data-prefix="S/N">S/N</button>
                  </div>
                </div>
                <div class="edit-wrapper">
                  <textarea class="edit-summary"></textarea>
                </div>
              </div>

              <div class="edit-column" data-edit-section="status">
                <h3 class="l-m0">Status</h3>
                <div class="inline-tags-block">
                  <div class="prefix-bar">
                    <button type="button" class="prefix-btn" data-prefix="S">S</button>
                    <button type="button" class="prefix-btn" data-prefix="SF">SF</button>
                    <button type="button" class="prefix-btn" data-prefix="S/N">S/N</button>
                  </div>
                </div>
                <div class="edit-wrapper">
                  <textarea class="edit-status"></textarea>
                </div>
              </div>
            </section>

            <section class="history-block">
              <div class="history-column history-column--summary">
                <h3 class="l-m0">Select a summary date below to view its contents</h3>
                <div class="history-layout">
                  <div class="histGroup" data-group="summary-inline">
                    <button class="histItem" type="button" data-template style="display:none;">
                      <div class="histHeader"></div>
                    </button>
                  </div>
                  <div class="history-detail" data-history-detail="summary">
                    <div class="history-detail__body"></div>
                  </div>
                </div>
              </div>

              <div class="history-column history-column--status">
                <h3>Select a status date below to view its contents</h3>
                <div class="history-layout">
                  <div class="histGroup" data-group="status-inline">
                    <button class="histItem" type="button" data-template style="display:none;">
                      <div class="histHeader"></div>
                    </button>
                  </div>
                  <div class="history-detail" data-history-detail="status">
                    <div class="history-detail__body"></div>
                  </div>
                </div>
              </div>
            </section>

            <div class="edit-actions">
              <button type="button" id="btn-save" class="btn">Save changes</button>
              <button type="button" id="btn-cancel" class="btn">Cancel</button>
            </div>
          </div>
        </div>
      </template>

      <div id="exportOverlay" class="export-overlay hidden">
        <div class="overlay-content">
          <h2>Export Selected Entries</h2>
          <label for="overlayDocClass">Document Classification</label>
          <select id="overlayDocClass"></select>
          <div class="overlay-actions">
            <button id="overlayCancel" type="button">Cancel</button>
            <button id="overlayExport" type="button">Export Demo File</button>
          </div>
        </div>
      </div>
    </section>
  </main>
</div>



<script src="js/editsearch-demo.js" defer></script>






</body>
</html>
